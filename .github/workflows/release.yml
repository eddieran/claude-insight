name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: claude-insight

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            setup: cargo install cross --locked
            build: cross build --locked --release --package claude-insight --bin claude-insight --target x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: linux-aarch64
            setup: cargo install cross --locked
            build: cross build --locked --release --package claude-insight --bin claude-insight --target aarch64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
            setup: ""
            build: cargo build --locked --release --package claude-insight --bin claude-insight --target x86_64-pc-windows-msvc
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: windows-aarch64
            setup: rustup target add aarch64-pc-windows-msvc
            build: cargo build --locked --release --package claude-insight --bin claude-insight --target aarch64-pc-windows-msvc
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: darwin-x86_64
            setup: ""
            build: cargo build --locked --release --package claude-insight --bin claude-insight --target x86_64-apple-darwin
          - runner: macos-15-intel
            target: aarch64-apple-darwin
            artifact_name: darwin-aarch64
            setup: rustup target add aarch64-apple-darwin
            build: cargo build --locked --release --package claude-insight --bin claude-insight --target aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Prepare toolchain
        if: ${{ matrix.setup != '' }}
        run: ${{ matrix.setup }}

      - name: Build release binary
        run: ${{ matrix.build }}

      - name: Stage build artifact
        shell: bash
        run: |
          set -euo pipefail
          binary_name="${BIN_NAME}"
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            binary_name="${BIN_NAME}.exe"
          fi
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.target }}/release/${binary_name}" "dist/${{ matrix.artifact_name }}/${binary_name}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/raw

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/package-release-assets.sh "${GITHUB_REF_NAME}" "dist/raw" "dist/release"

      - name: Validate packaged binary
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/validate-installed-binary.sh --artifact-dir dist/release

      - name: Publish assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" dist/release/* --title "$tag" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
