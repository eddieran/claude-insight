name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: claude-insight

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            binary_name: claude-insight
            install_target: false
            use_cross: true
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: linux-aarch64
            binary_name: claude-insight
            install_target: false
            use_cross: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
            binary_name: claude-insight.exe
            install_target: false
            use_cross: false
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: windows-aarch64
            binary_name: claude-insight.exe
            install_target: true
            use_cross: false
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: darwin-x86_64
            binary_name: claude-insight
            install_target: false
            use_cross: false
          - runner: macos-15-intel
            target: aarch64-apple-darwin
            artifact_name: darwin-aarch64
            binary_name: claude-insight
            install_target: true
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Rust target
        if: ${{ !matrix.use_cross && matrix.install_target }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build release binary with cross
        if: ${{ matrix.use_cross }}
        run: cross build --locked --release --package claude-insight --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Build release binary with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --locked --release --package claude-insight --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Stage build artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/raw

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist/release

          while IFS= read -r -d '' binary; do
            artifact_name="$(basename "$(dirname "$binary")")"
            binary_name="$(basename "$binary")"

            case "$artifact_name" in
              windows-*)
                asset_name="${BIN_NAME}-${version}-${artifact_name}.zip"
                (
                  cd "$(dirname "$binary")"
                  zip -q -j "$GITHUB_WORKSPACE/dist/release/$asset_name" "$binary_name"
                )
                ;;
              *)
                asset_name="${BIN_NAME}-${version}-${artifact_name}.tar.gz"
                chmod +x "$binary"
                tar -czf "dist/release/$asset_name" -C "$(dirname "$binary")" "$binary_name"
                ;;
            esac
          done < <(find dist/raw -type f -name "${BIN_NAME}*" -print0)

          (
            cd dist/release
            sha256sum ./* > SHA256SUMS
          )

      - name: Publish assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" dist/release/* --title "$tag" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
